version: "3"

# Global settings
silent: true

vars:
  # --- Dev Dependencies Versions ---
  AIR_VERSION: "v1.65.1"
  BUF_VERSION: "v1.69.0"
  GO_VERSION: "1.26.2"
  GOOSE_VERSION: "v3.27.1"
  GOLANGCI_LINT_VERSION: "v2.12.1"
  LEFTHOOK_VERSION: "v2.1.6"
  OGEN_VERSION: "v1.20.3"

  # --- Application binary name ---
  APP_NAME: go-starter

  # --- Directories ---
  BIN_DIR: "{{.ROOT_DIR}}/.bin"
  TOOLS_DIR: "{{.ROOT_DIR}}/.tools"

tasks:
  # --- Install dependencies and tools ---
  install:check-go:
    desc: "🔍 Check required Go version"
    cmds:
      - |
        GO_CURRENT_VERSION=$(go version | grep -o 'go[0-9]\+\.[0-9]\+\.[0-9]\+' | sed 's/go//')
        GO_REQUIRED_VERSION="{{.GO_VERSION}}"
        echo "Required Go version: $GO_REQUIRED_VERSION"
        echo "Current Go version: $GO_CURRENT_VERSION"
        if [ "$GO_CURRENT_VERSION" != "$GO_REQUIRED_VERSION" ]; then
          echo "❌ Go version mismatch!"
          exit 1
        fi
        echo "✅ Go version is correct"

  install:all:
    desc: "📦 Install all required dev deps and tools"
    cmds:
      - task: dev:install:deps
      # - task: dev:install:hooks

  install:deps:
    desc: "📦 Install all required dev deps to {{.TOOLS_DIR}}"
    deps: [install:check-go]
    cmds:
      - |
        if [ ! -d {{.TOOLS_DIR}} ]; then
          mkdir -p {{.TOOLS_DIR}}
        fi
      - |
        if [ ! -f {{.TOOLS_DIR}}/air ]; then
          GOBIN={{.TOOLS_DIR}} go install github.com/air-verse/air@{{.AIR_VERSION}}
        fi
      - |
        if [ ! -f {{.TOOLS_DIR}}/buf ]; then
          GOBIN={{.TOOLS_DIR}} go install github.com/bufbuild/buf/cmd/buf@{{.BUF_VERSION}}
        fi
      - |
        if [ ! -f {{.TOOLS_DIR}}/goose ]; then
          GOBIN={{.TOOLS_DIR}} go install github.com/pressly/goose/v3/cmd/goose@{{.GOOSE_VERSION}}
        fi
      - |
        if [ ! -f {{.TOOLS_DIR}}/golangci-lint ]; then
          GOBIN={{.TOOLS_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
        fi
      - |
        if [ ! -f {{.TOOLS_DIR}}/lefthook ]; then
          GOBIN={{.TOOLS_DIR}} go install github.com/evilmartians/lefthook/v2@{{.LEFTHOOK_VERSION}}
        fi
      - |
        if [ ! -f {{.TOOLS_DIR}}/ogen ]; then
          GOBIN={{.TOOLS_DIR}} go install github.com/ogen-go/ogen/cmd/ogen@{{.OGEN_VERSION}}
        fi

