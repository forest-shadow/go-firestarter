    deps: [install:deps]
    cmds:
      - '{{.TOOLS_DIR}}/air --build.cmd "go build -o {{.BIN_DIR}}/{{.APP_NAME}} ./cmd" --build.entrypoint "{{.BIN_DIR}}/{{.APP_NAME}}"'

